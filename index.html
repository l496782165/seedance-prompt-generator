<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedance 分镜提示词生成器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4zM4 18V8h16v10H4z"/>
                    </svg>
                    <h1>分镜生成器</h1>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item active" data-view="scripts">
                    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    剧本列表
                </a>
                <a class="nav-item" data-view="settings">
                    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    设置
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 剧本列表视图 -->
            <div id="view-scripts" class="view active">
                <div class="page-header">
                    <h2 class="page-title">我的剧本</h2>
                    <button id="btn-create-script" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        新建剧本
                    </button>
                </div>
                <div id="script-list">
                    <!-- 剧本卡片将在这里渲染 -->
                </div>
            </div>

            <!-- 剧本详情视图 -->
            <div id="view-script-detail" class="view">
                <div id="script-detail-content">
                    <!-- 详情内容将在这里渲染 -->
                </div>
            </div>

            <!-- 设置视图 -->
            <div id="view-settings" class="view">
                <div class="page-header">
                    <h2 class="page-title">设置</h2>
                </div>
                <div id="settings-content">
                    <!-- 设置内容将在这里渲染 -->
                </div>
            </div>
        </main>
    </div>

    <!-- ============ 模态框 ============ -->

    <!-- 创建剧本模态框 -->
    <div id="modal-create-script" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">创建新剧本</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="form-create-script">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="script-name">剧本名称</label>
                        <input type="text" name="name" class="form-input" placeholder="例如：青云山之战" required>
                    </div>
                    <div class="form-group">
                        <label for="script-description">剧本简介</label>
                        <textarea name="description" class="form-textarea" placeholder="简要描述剧本内容..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn modal-cancel">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 剧本设置模态框 -->
    <div id="modal-script-settings" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">剧本设置</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="form-script-settings">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="edit-script-name">剧本名称</label>
                        <input type="text" name="name" class="form-input" placeholder="剧本名称" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-script-description">剧本简介</label>
                        <textarea name="description" class="form-textarea" placeholder="简要描述剧本内容..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn modal-cancel">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 角色管理模态框 -->
    <div id="modal-character" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">添加角色</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="form-character">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="char-name">角色名称</label>
                        <input type="text" name="name" class="form-input" placeholder="例如：霍惊尘" required>
                    </div>
                    <div class="form-group">
                        <label for="char-appearance">外貌描述</label>
                        <textarea name="appearance" class="form-textarea" placeholder="例如：20岁青年，剑眉星目，一身黑色劲装..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="char-clothing">服装描述</label>
                        <input type="text" name="clothing" class="form-input" placeholder="例如：黑色玄铁铠甲">
                    </div>
                    <div class="form-group">
                        <label for="char-weapon">武器描述</label>
                        <input type="text" name="weapon" class="form-input" placeholder="例如：青锋长剑">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn modal-cancel">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 分镜管理模态框 -->
    <div id="modal-shot" class="modal-overlay">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title">创建分镜</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="form-shot">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="shot-duration">时长（秒）</label>
                        <input type="number" name="duration" class="form-input" value="5" min="1" max="60">
                    </div>
                    <div class="form-group">
                        <label for="shot-recipe">配方选择</label>
                        <select name="recipeId" class="form-select">
                            <option value="">不使用配方（简单模式）</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="shot-scene">场景描述</label>
                        <textarea name="sceneDescription" class="form-textarea" placeholder="描述场景，例如：@[青云山悬崖边]，黄昏夕照，浓云密布"></textarea>
                        <p class="form-hint">使用 @[角色名] 引用角色</p>
                    </div>
                    <div class="form-group">
                        <label for="shot-action">动作描述</label>
                        <textarea name="actionDescription" class="form-textarea" placeholder="描述角色动作，例如：霍惊尘侧身闪避，剑刃擦身而过，火星四溅"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="shot-camera">运镜补充说明</label>
                        <input type="text" name="cameraInstruction" class="form-input" placeholder="补充特定的运镜要求，如：镜头剧烈晃动">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn modal-cancel">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 配方选择模态框 -->
    <div id="modal-recipe-view" class="modal-overlay">
        <div class="modal" style="max-width: 700px;">
            <div class="modal-header">
                <h3 class="modal-title">配方详情</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="recipe-view-content">
                <!-- 配方详情将在这里渲染 -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn modal-cancel">关闭</button>
            </div>
        </div>
    </div>

    <!-- 提示词预览模态框 -->
    <div id="modal-prompt-preview" class="modal-overlay">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h3 class="modal-title">生成的提示词</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="prompt-preview-content" class="prompt-content" style="max-height: 400px; overflow-y: auto;"></pre>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn modal-cancel">关闭</button>
                <button type="button" class="btn btn-primary" id="btn-copy-prompt">复制提示词</button>
            </div>
        </div>
    </div>

    <!-- 引入脚本 -->
    <script src="js/recipe-library.js"></script>
    <script src="js/prompt-generator.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
